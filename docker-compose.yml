services:
  application:
    build: 
      context: ./docker/php
      dockerfile: Dockerfile
    image: application
    container_name: application
    tty: true
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www
    networks:
      - laravel_app
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_app
    depends_on:
      - application
  mysql:
    image: mysql:8.1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pibic
      MYSQL_USER: user
      MYSQL_PASSWORD: 1131
    ports:
      - "3306:3306"
    networks:
      - laravel_app
networks:
  laravel_app:
    driver: bridge
