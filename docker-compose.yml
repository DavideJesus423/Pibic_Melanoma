services:
  application:
    build: 
      context: ./docker/php
      dockerfile: Dockerfile
    image: application
    container_name: application
    tty: true
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www
    networks:
      - laravel_app
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_app
    depends_on:
      - application
  mysql:
    image: mysql:8.1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pibic
      MYSQL_USER: user
      MYSQL_PASSWORD: 1131
    ports:
      - "3306:3306"
    networks:
      - laravel_app

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9002"
      - "9001:9001"
    
    command: server /data --console-address ":9001"
    networks:
      - laravel_app
    volumes:
      - minio_data:/data

networks:
  laravel_app:
    driver: bridge

volumes:
  minio_data: