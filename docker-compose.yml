services:
  application:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    image: application
    container_name: application
    tty: true
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www
    networks:
      - laravel_app
    depends_on:
      mysql:
        condition: service_healthy
      ia_service:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_app
    depends_on:
      - application

  mysql:
    image: mysql:8.1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pibic
      MYSQL_USER: user
      MYSQL_PASSWORD: 1131
    ports:
      - "3307:3306"
    networks:
      - laravel_app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - laravel_app
    volumes:
      - minio_data:/data

  # ✅ Novo: microsserviço de IA
  ia_service:
    build:
      context: ./ia-melanoma   # pasta onde ficará o FastAPI
      dockerfile: Dockerfile
    container_name: ia_service
    ports:
      - "8000:8000"
    volumes:
      - ./ia-melanoma:/app
    networks:
      - laravel_app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  laravel_app:
    driver: bridge

volumes:
  minio_data: